<style>

body{

    margin:0;

}

header{

    background:#0077b6;

.tarjeta{

input,

button{

}

table{

    width:100%;

td,
th{

    border:1px solid #ddd;
    padding:8px;

}

.total{

    font-size:22px;
    color:#0077b6;
    font-weight:bold;

<body>

    <script>

const SUPABASE_URL =
"https://ayzddkcxeswjfpinwvth.supabase.co";

const SUPABASE_KEY =
"sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);
        let productoSeleccionado = null;
        let productos = [];
        let venta = {

    cliente:null,

    mayorista:null,

    tipoPrecio:null,

    precioBotellon:0

};

let empresa={};

let cai={};

window.onload = async()=>{

    await cargarEmpresa();

    await cargarCAI();

    await cargarClientes();

    await cargarProductos();

}



        async function cargarEmpresa(){

    const { data,error } =
    await supabaseClient

    .from("empresa")

    .select("*")

    .single();

    if(error){

        alert(error.message);

        return;

    }

    empresa=data;

}


        async function cargarCAI(){

    const { data,error } =
    await supabaseClient

    .from("cai_facturacion")

    .select("*")

    .eq("activo",true)

    .single();

    if(error){

        alert(error.message);

        return;

    }

    cai=data;

const numeroFactura =
    cai.prefijo +
    String(cai.numero_actual).padStart(8,"0");

document.getElementById(
    "numeroFactura"
).value = numeroFactura;

document.getElementById(
    "fechaFactura"
).value =
new Date().toLocaleDateString();

document.getElementById(
    "cai"
).value = cai.cai;

document.getElementById(
    "vence"
).value = cai.fecha_limite;

}

        async function cargarClientes(){

    const { data,error } =
        await supabaseClient

        .from("clientes")

        .select("*")

        .order("nombre");

    if(error){

        alert(error.message);
        return;

    }

    listaClientes = data;

}

        function buscarCliente(){

    const texto =
        document
        .getElementById("buscarCliente")
        .value
        .toLowerCase();

    if(texto.length<2){

        document.getElementById(
            "resultadoBusqueda"
        ).innerHTML="";

        return;

    }

    const encontrados =
        listaClientes.filter(c=>

            c.nombre
            .toLowerCase()
            .includes(texto)

            ||

            c.telefono
            .includes(texto)

        );

    let html="";

    encontrados.forEach(cliente=>{

        html+=`

<div

onclick="seleccionarCliente('${cliente.id}')"

style="

padding:10px;

border-bottom:1px solid #ddd;

cursor:pointer;

background:white;

">

<b>

${cliente.nombre}

</b>

<br>

${cliente.telefono}

</div>

`;

    });

    document.getElementById(
        "resultadoBusqueda"
    ).innerHTML=html;

}

        async function seleccionarCliente(id){

    clienteSeleccionado =
        listaClientes.find(c=>c.id===id);

    document.getElementById(
        "nombreCliente"
    ).value =
    clienteSeleccionado.nombre;

    document.getElementById(
        "rtnCliente"
    ).value =
    clienteSeleccionado.identificacion || "";

    document.getElementById(
        "direccionCliente"
    ).value =
    clienteSeleccionado.barrio || "";

    document.getElementById(
        "buscarCliente"
    ).value =
    clienteSeleccionado.nombre;

    document.getElementById(
        "resultadoBusqueda"
    ).innerHTML="";

await cargarDatosComerciales(
    clienteSeleccionado);

}

        async function cargarDatosComerciales(cliente){

    venta.cliente = cliente;

    const { data: mayorista } =
        await supabaseClient

        .from("clientes_mayoristas")

        .select("*")

        .eq("cliente_id",cliente.id)

        .maybeSingle();

    if(mayorista){

        venta.mayorista = mayorista;

        venta.tipoPrecio =
            mayorista.tipo_precio;

        venta.precioBotellon =
            Number(
                mayorista.precio_botellon
            );

        document.getElementById(
            "tipoCliente"
        ).value = "Tienda";

        document.getElementById(
            "nombreComercial"
        ).value =
        mayorista.nombre_tienda;

        document.getElementById(
            "tipoPrecio"
        ).value =
        mayorista.tipo_precio;

        document.getElementById(
            "precioBotellon"
        ).value =
        "L " +
        venta.precioBotellon.toFixed(2);

    }else{

        venta.mayorista = null;

        venta.tipoPrecio =
            "precio_publico_zona1";

        venta.precioBotellon =
            Number(
                configuracion.precio_publico_zona1
            );

        document.getElementById(
            "tipoCliente"
        ).value =
        "Cliente Final";

        document.getElementById(
            "nombreComercial"
        ).value = "";

        document.getElementById(
            "tipoPrecio"
        ).value =
        "Público";

        document.getElementById(
            "precioBotellon"
        ).value =
        "L " +
        venta.precioBotellon.toFixed(2);

    }

}

        async function cargarProductos(){

    const { data, error } =
        await supabaseClient

        .from("productos")

        .select("*")

        .eq("activo", true)

        .order("nombre");

    if(error){

        alert(error.message);
        return;

    }

    productos = data;

    mostrarProductos();

}

        function mostrarProductos(){

    let html = "";

    productos.forEach(producto=>{

        html += `

<button

style="
flex:1;
min-width:180px;
height:90px;
font-size:20px;
"

onclick="pedirCantidad('${producto.id}')">

${producto.nombre}

</button>

`;

    });

    document.getElementById(
        "listaProductos"
    ).innerHTML = html;

}

        function pedirCantidad(id){

    productoSeleccionado =
        productos.find(p=>p.id===id);

    document.getElementById(
        "tituloProducto"
    ).innerHTML =
    productoSeleccionado.nombre;

    let precio = 0;

    if(
        productoSeleccionado.nombre
        .toLowerCase()
        .includes("botell")
    ){

        precio =
        venta.precioBotellon;

    }else{

        precio =
        Number(
            configuracion[
                productoSeleccionado.precio_configuracion
            ] || 0
        );

    }

    productoSeleccionado.precioVenta =
        precio;

    document.getElementById(
        "precioProducto"
    ).innerHTML =
    "L " +
    precio.toFixed(2);

    document.getElementById(
        "cantidadProducto"
    ).value = 1;

    calcularSubtotalProducto();

    document.getElementById(
        "modalCantidad"
    ).style.display =
    "flex";

}

        function calcularSubtotalProducto(){

    const cantidad =
        Number(
            document.getElementById(
                "cantidadProducto"
            ).value
        );

    const subtotal =
        cantidad *
        productoSeleccionado.precioVenta;

    document.getElementById(
        "subtotalProducto"
    ).innerHTML =
    "Subtotal: L " +
    subtotal.toFixed(2);

}

        function cerrarModal(){

    document.getElementById(
        "modalCantidad"
    ).style.display =
    "none";

}

        function agregarProductoFactura(){

    const cantidad =
        Number(
            document.getElementById(
                "cantidadProducto"
            ).value
        );

    alert(

        productoSeleccionado.nombre +

        "\n\nCantidad: " +

        cantidad +

        "\n\nPrecio: L " +

        productoSeleccionado.precioVenta

    );

    cerrarModal();

}


        let listaClientes = [];

        let clienteSeleccionado = null;

</script>
    


    <div
id="modalCantidad"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
justify-content:center;
align-items:center;
z-index:9999;
">

<div
style="
background:white;
width:340px;
max-width:95%;
border-radius:12px;
padding:20px;
">

<h2
id="tituloProducto">

Producto

</h2>

<h3
id="precioProducto"
style="
color:#0077b6;
">

L 0.00

</h3>

<label>

Cantidad

</label>

<input

id="cantidadProducto"

type="number"

min="1"

value="1"

oninput="calcularSubtotalProducto()">

<h2
id="subtotalProducto">

L 0.00

</h2>

<div
style="
display:flex;
gap:10px;
margin-top:20px;
">

<button

onclick="agregarProductoFactura()">

Aceptar

</button>

<button

onclick="cerrarModal()">

Cancelar

</button>

</div>

</div>

</div>

    
</body>

</html>
