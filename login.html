<!DOCTYPE html>
<html>
<head>
    <title>Iniciar Sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>Agua Clara La Muralla</h1>

<input type="email"
       id="correo"
       placeholder="Correo">

<input type="password"
       id="clave"
       placeholder="Contraseña">

<button onclick="login()">
    Iniciar sesión
</button>

<script>

const SUPABASE_URL = "https://ayzddkcxeswjfpinwvth.supabase.co";
const SUPABASE_KEY = "sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient =
    supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );

verificarSesion();

async function login() {

    const email =
        document.getElementById(
            "correo"
        ).value;

    const password =
        document.getElementById(
            "clave"
        ).value;

    const { error } =
        await supabaseClient.auth
        .signInWithPassword({
            email,
            password
        });

    if (error) {
    alert(error.message);
    return;
}

const { data: usuario } =
    await supabaseClient.auth
    .getUser();

const { data: perfil, error: errorPerfil } =
    await supabaseClient
    .from("usuarios")
    .select("*")
    .eq("id", usuario.user.id)
    .single();

if (errorPerfil) {
    alert(
        "El usuario no tiene rol asignado."
    );
    return;
}

if (perfil.rol === "administrador") {
    window.location.href =
        "admin.html";
}
else if (perfil.rol === "cajera") {
    window.location.href =
        "cierres.html";
}
else if (perfil.rol === "chofer") {
    window.location.href =
        "admin.html";
}
}

</script>

</body>
</html>
