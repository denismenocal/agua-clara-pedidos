<!DOCTYPE html>
<html>
<head>

    <button onclick="cerrarSesion()">
    Cerrar sesión
</button>
    
    <title>Cierre de Viajes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            padding: 12px;
            width: 100%;
        }

        h3 {
            background: #eee;
            padding: 8px;
        }
    </style>
</head>
<body>

<h1>Cierre de Viajes</h1>

<h3>Información General</h3>

<select id="camion">
    <option>JAC 1</option>
    <option>JAC 2</option>
</select>

<select id="chofer">
    <option>Erick Hernández</option>
    <option>Cristian</option>
</select>

<input type="number"
       id="numero_viaje"
       placeholder="Número de viaje">

<input type="time"
       id="hora_salida">

<input type="time"
       id="hora_regreso">

<h3>Botellones</h3>

<input type="number" id="botellones_cargados"
       placeholder="Botellones cargados">

<input type="number" id="zona1_publico"
       placeholder="Zona 1 público">

<input type="number" id="zona1_pulperia"
       placeholder="Zona 1 pulpería">

<input type="number" id="zona2_publico"
       placeholder="Zona 2 público">

<input type="number" id="zona2_pulperia"
       placeholder="Zona 2 pulpería">

<input type="number" id="botellones_vacios"
       placeholder="Botellones vacíos recibidos">

<h3>Agua en bolsa</h3>

<input type="number" id="agua_cargada"
       placeholder="Paquetes cargados">

<input type="number" id="agua_vendida"
       placeholder="Paquetes vendidos">

<input type="number" id="agua_regalada"
       placeholder="Paquetes regalados">

<h3>Juguitos</h3>

<input type="number" id="juguitos_cargados"
       placeholder="Cargados">

<input type="number" id="juguitos_vendidos"
       placeholder="Vendidos">

<h3>Hielo</h3>

<input type="number" id="hielo_cargado"
       placeholder="Cargado">

<input type="number" id="hielo_vendido"
       placeholder="Vendido">

<h3>Caja</h3>

<input type="number"
       step="0.01"
       id="efectivo_entregado"
       placeholder="Efectivo entregado">

<textarea id="observaciones"
          placeholder="Observaciones"></textarea>

    <h3>Resumen</h3>

<p>Botellones devueltos:
    <span id="botellones_devueltos">0</span>
</p>

<p>Agua devuelta:
    <span id="agua_devuelta">0</span>
</p>

<p>Juguitos devueltos:
    <span id="juguitos_devueltos">0</span>
</p>

<p>Hielo devuelto:
    <span id="hielo_devuelto">0</span>
</p>

<hr>

<p>Total venta:
    <b>L <span id="total_venta">0.00</span></b>
</p>

<p>Diferencia:
    <b>L <span id="diferencia">0.00</span></b>
</p>

<button onclick="guardarViaje()">
    Guardar cierre
</button>

    <script>

const SUPABASE_URL = "https://ayzddkcxeswjfpinwvth.supabase.co";
const SUPABASE_KEY = "sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

        async function verificarSesion() {

    const { data } =
        await supabaseClient.auth
        .getSession();

    if (!data.session) {
        window.location.href =
            "login.html";
        return;
    }

    const { data: perfil } =
        await supabaseClient
        .from("usuarios")
        .select("rol")
        .eq(
            "id",
            data.session.user.id
        )
        .single();

    if (
    !perfil ||
    (
        perfil.rol !== "administrador" &&
        perfil.rol !== "chofer"
    )
    {
        alert(
            "Acceso denegado"
        );

        window.location.href =
            "login.html";
    }
}

verificarSesion();

        async function cerrarSesion() {

    await supabaseClient.auth
        .signOut();

    window.location.href =
        "login.html";
}

verificarSesion();
        
        function calcularTotales() {

    const botellones_cargados =
        parseInt(document.getElementById(
            "botellones_cargados").value) || 0;

    const z1p =
        parseInt(document.getElementById(
            "zona1_publico").value) || 0;

    const z1pu =
        parseInt(document.getElementById(
            "zona1_pulperia").value) || 0;

    const z2p =
        parseInt(document.getElementById(
            "zona2_publico").value) || 0;

    const z2pu =
        parseInt(document.getElementById(
            "zona2_pulperia").value) || 0;

    const agua_cargada =
        parseInt(document.getElementById(
            "agua_cargada").value) || 0;

    const agua_vendida =
        parseInt(document.getElementById(
            "agua_vendida").value) || 0;

    const agua_regalada =
        parseInt(document.getElementById(
            "agua_regalada").value) || 0;

    const juguitos_cargados =
        parseInt(document.getElementById(
            "juguitos_cargados").value) || 0;

    const juguitos_vendidos =
        parseInt(document.getElementById(
            "juguitos_vendidos").value) || 0;

    const hielo_cargado =
        parseInt(document.getElementById(
            "hielo_cargado").value) || 0;

    const hielo_vendido =
        parseInt(document.getElementById(
            "hielo_vendido").value) || 0;

    const efectivo =
        parseFloat(document.getElementById(
            "efectivo_entregado").value) || 0;

    const total_botellones =
        z1p * 40 +
        z1pu * 35 +
        z2p * 35 +
        z2pu * 30;

    const total_agua =
        agua_vendida * 25;

    const total_juguitos =
        juguitos_vendidos * 25;

    const total_hielo =
        hielo_vendido * 25;

    const total =
        total_botellones +
        total_agua +
        total_juguitos +
        total_hielo;

    const diferencia =
        efectivo - total;

    document.getElementById(
        "botellones_devueltos").innerText =
        botellones_cargados -
        z1p - z1pu - z2p - z2pu;

    document.getElementById(
        "agua_devuelta").innerText =
        agua_cargada -
        agua_vendida -
        agua_regalada;

    document.getElementById(
        "juguitos_devueltos").innerText =
        juguitos_cargados -
        juguitos_vendidos;

    document.getElementById(
        "hielo_devuelto").innerText =
        hielo_cargado -
        hielo_vendido;

    document.getElementById(
        "total_venta").innerText =
        total.toFixed(2);

    document.getElementById(
        "diferencia").innerText =
        diferencia.toFixed(2);
}

async function guardarViaje() {

    const fecha = new Date()
    .toLocaleDateString('en-CA');

    const camion =
        document.getElementById("camion").value;

    const chofer =
        document.getElementById("chofer").value;

    const numero_viaje =
        parseInt(document.getElementById(
            "numero_viaje").value) || 1;

    const hora_salida =
        document.getElementById(
            "hora_salida").value;

    const hora_regreso =
        document.getElementById(
            "hora_regreso").value;

    const botellones_cargados =
        parseInt(document.getElementById(
            "botellones_cargados").value) || 0;

    const zona1_publico =
        parseInt(document.getElementById(
            "zona1_publico").value) || 0;

    const zona1_pulperia =
        parseInt(document.getElementById(
            "zona1_pulperia").value) || 0;

    const zona2_publico =
        parseInt(document.getElementById(
            "zona2_publico").value) || 0;

    const zona2_pulperia =
        parseInt(document.getElementById(
            "zona2_pulperia").value) || 0;

    const botellones_vacios =
        parseInt(document.getElementById(
            "botellones_vacios").value) || 0;

    const agua_cargada =
        parseInt(document.getElementById(
            "agua_cargada").value) || 0;

    const agua_vendida =
        parseInt(document.getElementById(
            "agua_vendida").value) || 0;

    const agua_regalada =
        parseInt(document.getElementById(
            "agua_regalada").value) || 0;

    const juguitos_cargados =
        parseInt(document.getElementById(
            "juguitos_cargados").value) || 0;

    const juguitos_vendidos =
        parseInt(document.getElementById(
            "juguitos_vendidos").value) || 0;

    const hielo_cargado =
        parseInt(document.getElementById(
            "hielo_cargado").value) || 0;

    const hielo_vendido =
        parseInt(document.getElementById(
            "hielo_vendido").value) || 0;

    const efectivo_entregado =
        parseFloat(document.getElementById(
            "efectivo_entregado").value) || 0;

    const observaciones =
        document.getElementById(
            "observaciones").value;

    // Cálculos automáticos
    const total_botellones =
        zona1_publico * 40 +
        zona1_pulperia * 35 +
        zona2_publico * 35 +
        zona2_pulperia * 30;

    const total_agua =
        agua_vendida * 25;

    const total_juguitos =
        juguitos_vendidos * 25;

    const total_hielo =
        hielo_vendido * 25;

    const total_venta =
        total_botellones +
        total_agua +
        total_juguitos +
        total_hielo;

    const diferencia =
        efectivo_entregado -
        total_venta;

    const { error } =
        await supabaseClient
        .from("viajes")
        .insert([{
            fecha,
            camion,
            chofer,
            numero_viaje,
            hora_salida,
            hora_regreso,
            botellones_cargados,
            zona1_publico,
            zona1_pulperia,
            zona2_publico,
            zona2_pulperia,
            botellones_vacios,
            agua_cargada,
            agua_vendida,
            agua_regalada,
            juguitos_cargados,
            juguitos_vendidos,
            hielo_cargado,
            hielo_vendido,
            efectivo_entregado,
            total_venta,
            diferencia,
            observaciones
        }]);

    if (error) {
        alert("Error: " + error.message);
        console.log(error);
    } else {
        alert("Cierre guardado correctamente");
        document.querySelectorAll(
        "input, textarea"
        ).forEach(campo => {
        campo.value = "";
        });

        document.getElementById("camion").selectedIndex = 0;
        document.getElementById("chofer").selectedIndex = 0;

        calcularTotales();
    }
}

        document.querySelectorAll(
    "input"
).forEach(input => {
    input.addEventListener(
        "input",
        calcularTotales
    );
});

</script>

</body>
</html>
