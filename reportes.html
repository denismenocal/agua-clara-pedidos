<!DOCTYPE html>
<html>
<head>
    
    <title>Reportes de Viajes</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .viaje {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        select, input {
            padding: 10px;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

     <div style="display:flex;gap:10px;margin-bottom:15px;">

<button onclick="location.href='menu.html'">
🏠 Menú
</button>

<button onclick="cerrarSesion()">
🚪 Salir
</button>

</div>

<h1>Reportes de Viajes</h1>

<input type="date" id="fecha">

<select id="camion">
    <option value="">Todos los camiones</option>
    <option>JAC 1</option>
    <option>JAC 2</option>
</select>

<button onclick="cargarViajes()">
    Buscar
</button>

    <div id="resumen"
     style="
        border:1px solid #ccc;
        padding:15px;
        border-radius:10px;
        margin-top:10px;
        margin-bottom:10px;
     ">
     
    <h3>Resumen Diario</h3>

    <div id="contenidoResumen">
        Sin datos
    </div>

</div>

<hr>

<div id="lista"></div>

    <hr>

<div id="detalleViaje"
     style="display:none;
            border:1px solid #ccc;
            padding:15px;
            margin-top:20px;
            border-radius:10px;">

    <h2>Detalle del Viaje</h2>

    <div id="contenidoDetalle"></div>

</div>

    <script>

const SUPABASE_URL = "https://ayzddkcxeswjfpinwvth.supabase.co";
const SUPABASE_KEY = "sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

        async function verificarSesion() {

    const { data } =
        await supabaseClient.auth
        .getSession();

    if (!data.session) {
        window.location.href =
            "login.html";
        return;
    }

    const { data: perfil } =
        await supabaseClient
        .from("usuarios")
        .select("rol")
        .eq(
            "id",
            data.session.user.id
        )
        .single();

    if (
        perfil.rol !==
        "administrador"
    ) {
        alert(
            "Acceso denegado"
        );

        window.location.href =
            "login.html";
    }
}

verificarSesion();

        async function cerrarSesion() {

    await supabaseClient.auth
        .signOut();

    window.location.href =
        "login.html";
}

verificarSesion();

async function cargarViajes() {

    let consulta = supabaseClient
        .from("viajes")
        .select("*")
        .order("fecha", { ascending: false });

    const fecha =
        document.getElementById("fecha").value;

    const camion =
        document.getElementById("camion").value;

    if (fecha) {
        consulta = consulta.eq(
            "fecha",
            fecha
        );
    }

    if (camion) {
        consulta = consulta.eq(
            "camion",
            camion
        );
    }

    const { data, error } =
        await consulta;

    if (error) {
        alert(
            "Error: " +
            error.message
        );
        return;
    }

    let totalVenta = 0;
    let totalEfectivo = 0;
    let totalDiferencia = 0;

    let botellonesVendidos = 0;
    let totalBotellonesNuevos = 0;
    let botellonesVacios = 0;

    let aguaVendida = 0;
    let aguaRegalada = 0;

    let juguitosVendidos = 0;
    let hieloVendido = 0;

    let html = "";

    data.forEach(viaje => {

        totalVenta += Number(viaje.total_venta || 0);

totalEfectivo += Number(
    viaje.efectivo_entregado || 0
);

totalDiferencia += Number(
    viaje.diferencia || 0
);

botellonesVendidos +=
    Number(viaje.zona1_publico || 0) +
    Number(viaje.zona1_pulperia || 0) +
    Number(viaje.zona2_publico || 0) +
    Number(viaje.zona2_pulperia || 0);

totalBotellonesNuevos +=
    viaje.botellon_nuevo || 0;

botellonesVacios += Number(
    viaje.botellones_vacios || 0
);

aguaVendida += Number(
    viaje.agua_vendida || 0
);

aguaRegalada += Number(
    viaje.agua_regalada || 0
);

juguitosVendidos += Number(
    viaje.juguitos_vendidos || 0
);

hieloVendido += Number(
    viaje.hielo_vendido || 0
);

        html += `
        <div class="viaje">

            <h3>${viaje.camion}
            - Viaje ${viaje.numero_viaje}</h3>

            <p><b>Fecha:</b>
            ${viaje.fecha}</p>

            <p><b>Chofer:</b>
            ${viaje.chofer}</p>

            <p><b>Total:</b>
            L ${viaje.total_venta}</p>

            <p><b>Efectivo:</b>
            L ${viaje.efectivo_entregado}</p>

            <p><b>Diferencia:</b>
            L ${viaje.diferencia}</p>

            <button onclick="
            verDetalle('${viaje.id}')
            ">
            Ver detalle
            </button>

        </div>
        `;
    });

    document.getElementById(
    "contenidoResumen"
).innerHTML = `

<p><b>Total vendido:</b>
L ${totalVenta.toFixed(2)}</p>

<p><b>Efectivo recibido:</b>
L ${totalEfectivo.toFixed(2)}</p>

<p><b>Diferencia:</b>
L ${totalDiferencia.toFixed(2)}</p>

<hr>

<p><b>Botellones vendidos:</b>
${botellonesVendidos}</p>

<p><b>Botellones + Agua Nuevos vendidos:</b>
${totalBotellonesNuevos}</p>

<p><b>Botellones vacíos:</b>
${botellonesVacios}</p>

<p><b>Agua vendida:</b>
${aguaVendida}</p>

<p><b>Agua regalada:</b>
${aguaRegalada}</p>

<p><b>Juguitos vendidos:</b>
${juguitosVendidos}</p>

<p><b>Hielo vendido:</b>
${hieloVendido}</p>

`;

    document.getElementById(
        "lista"
    ).innerHTML = html;
}

async function verDetalle(id) {

    const { data, error } =
        await supabaseClient
        .from("viajes")
        .select("*")
        .eq("id", id)
        .single();

    if (error) {
        alert(error.message);
        return;
    }

    let html = `

    <p><b>Camión:</b>
    ${data.camion}</p>

    <p><b>Chofer:</b>
    ${data.chofer}</p>

    <p><b>Viaje:</b>
    ${data.numero_viaje}</p>

    <p><b>Hora salida:</b>
    ${data.hora_salida}</p>

    <p><b>Hora regreso:</b>
    ${data.hora_regreso}</p>

    <hr>

    <h3>Botellones</h3>

    <p>Cargados:
    ${data.botellones_cargados}</p>

    <p>Zona 1 Público:
    ${data.zona1_publico}</p>

    <p>Zona 1 Pulpería:
    ${data.zona1_pulperia}</p>

    <p>Zona 2 Público:
    ${data.zona2_publico}</p>

    <p>Zona 2 Pulpería:
    ${data.zona2_pulperia}</p>

    <p>Botellón nuevo + agua:
    ${data.botellon_nuevo}</p>

    <p>Vacíos recibidos:
    ${data.botellones_vacios}</p>

    <hr>

    <h3>Agua en bolsa</h3>

    <p>Cargada:
    ${data.agua_cargada}</p>

    <p>Vendida:
    ${data.agua_vendida}</p>

    <p>Regalada:
    ${data.agua_regalada}</p>

    <hr>

    <h3>Juguitos</h3>

    <p>Cargados:
    ${data.juguitos_cargados}</p>

    <p>Vendidos:
    ${data.juguitos_vendidos}</p>

    <hr>

    <h3>Hielo</h3>

    <p>Cargado:
    ${data.hielo_cargado}</p>

    <p>Vendido:
    ${data.hielo_vendido}</p>

    <hr>

    <h3>Finanzas</h3>

    <p>Total venta:
    L ${data.total_venta}</p>

    <p>Efectivo:
    L ${data.efectivo_entregado}</p>

    <p>Diferencia:
    L ${data.diferencia}</p>

    <p>Observaciones:
    ${data.observaciones || ""}</p>

    `;

    document.getElementById(
        "contenidoDetalle"
    ).innerHTML = html;

    document.getElementById(
        "detalleViaje"
    ).style.display = "block";

    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
    });
}


cargarViajes();

</script>

</body>
</html>
