<!DOCTYPE html>
<html>
<head>
    <title>Reportes de Viajes</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .viaje {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        select, input {
            padding: 10px;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

<h1>Reportes de Viajes</h1>

<input type="date" id="fecha">

<select id="camion">
    <option value="">Todos los camiones</option>
    <option>JAC 1</option>
    <option>JAC 2</option>
</select>

<button onclick="cargarViajes()">
    Buscar
</button>

<hr>

<div id="lista"></div>

    <hr>

<div id="detalleViaje"
     style="display:none;
            border:1px solid #ccc;
            padding:15px;
            margin-top:20px;
            border-radius:10px;">

    <h2>Detalle del Viaje</h2>

    <div id="contenidoDetalle"></div>

</div>

    <script>

const SUPABASE_URL = "https://ayzddkcxeswjfpinwvth.supabase.co";
const SUPABASE_KEY = "sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

async function cargarViajes() {

    let consulta = supabaseClient
        .from("viajes")
        .select("*")
        .order("fecha", { ascending: false });

    const fecha =
        document.getElementById("fecha").value;

    const camion =
        document.getElementById("camion").value;

    if (fecha) {
        consulta = consulta.eq(
            "fecha",
            fecha
        );
    }

    if (camion) {
        consulta = consulta.eq(
            "camion",
            camion
        );
    }

    const { data, error } =
        await consulta;

    if (error) {
        alert(
            "Error: " +
            error.message
        );
        return;
    }

    let html = "";

    data.forEach(viaje => {

        html += `
        <div class="viaje">

            <h3>${viaje.camion}
            - Viaje ${viaje.numero_viaje}</h3>

            <p><b>Fecha:</b>
            ${viaje.fecha}</p>

            <p><b>Chofer:</b>
            ${viaje.chofer}</p>

            <p><b>Total:</b>
            L ${viaje.total_venta}</p>

            <p><b>Efectivo:</b>
            L ${viaje.efectivo_entregado}</p>

            <p><b>Diferencia:</b>
            L ${viaje.diferencia}</p>

            <button onclick="
            verDetalle('${viaje.id}')
            ">
            Ver detalle
            </button>

        </div>
        `;
    });

    document.getElementById(
        "lista"
    ).innerHTML = html;
}

async function verDetalle(id) {

    const { data, error } =
        await supabaseClient
        .from("viajes")
        .select("*")
        .eq("id", id)
        .single();

    if (error) {
        alert(error.message);
        return;
    }

    let html = `

    <p><b>Camión:</b>
    ${data.camion}</p>

    <p><b>Chofer:</b>
    ${data.chofer}</p>

    <p><b>Viaje:</b>
    ${data.numero_viaje}</p>

    <p><b>Hora salida:</b>
    ${data.hora_salida}</p>

    <p><b>Hora regreso:</b>
    ${data.hora_regreso}</p>

    <hr>

    <h3>Botellones</h3>

    <p>Cargados:
    ${data.botellones_cargados}</p>

    <p>Zona 1 Público:
    ${data.zona1_publico}</p>

    <p>Zona 1 Pulpería:
    ${data.zona1_pulperia}</p>

    <p>Zona 2 Público:
    ${data.zona2_publico}</p>

    <p>Zona 2 Pulpería:
    ${data.zona2_pulperia}</p>

    <p>Vacíos recibidos:
    ${data.botellones_vacios}</p>

    <hr>

    <h3>Agua en bolsa</h3>

    <p>Cargada:
    ${data.agua_cargada}</p>

    <p>Vendida:
    ${data.agua_vendida}</p>

    <p>Regalada:
    ${data.agua_regalada}</p>

    <hr>

    <h3>Juguitos</h3>

    <p>Cargados:
    ${data.juguitos_cargados}</p>

    <p>Vendidos:
    ${data.juguitos_vendidos}</p>

    <hr>

    <h3>Hielo</h3>

    <p>Cargado:
    ${data.hielo_cargado}</p>

    <p>Vendido:
    ${data.hielo_vendido}</p>

    <hr>

    <h3>Finanzas</h3>

    <p>Total venta:
    L ${data.total_venta}</p>

    <p>Efectivo:
    L ${data.efectivo_entregado}</p>

    <p>Diferencia:
    L ${data.diferencia}</p>

    <p>Observaciones:
    ${data.observaciones || ""}</p>

    `;

    document.getElementById(
        "contenidoDetalle"
    ).innerHTML = html;

    document.getElementById(
        "detalleViaje"
    ).style.display = "block";

    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
    });
}
}

cargarViajes();

</script>

</body>
</html>
