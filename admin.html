<!DOCTYPE html>
<html>
<head>
    
    <title>Panel Administrativo</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0077b6">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon"
      href="img/favicon_64.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        
        body {
            font-family: Arial;
            padding: 20px;
        }

        .pedido {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
        }

        input,
select,
textarea,
button {

    font-size: 18px;
    padding: 14px;
    box-sizing: border-box;

}

        button {

    width: 100%;
    border-radius: 10px;
    border: none;

}
    </style>
</head>
<body>

    <div style="display:flex;gap:10px;margin-bottom:15px;">

<button onclick="location.href='menu.html'">
🏠 Menú
</button>

<button onclick="cerrarSesion()">
🚪 Salir
</button>

</div>

    <div id="alertaPedidos"
     style="
     display:none;
     background:#28a745;
     color:white;
     padding:10px;
     border-radius:8px;
     margin-bottom:10px;">
</div>

<h1>Pedidos Agua Clara</h1>

    <h2 id="contadorPedidos">
0 pedidos
</h2>

    <button onclick="cargarPedidos('Pendiente')">
    Pendientes
    </button>

    <button onclick="cargarPedidos('En ruta')">
    En ruta
    </button>

    <button onclick="cargarPedidos('Entregado')">
    Entregados
    </button>

<hr>

<div id="listaPedidos"></div>

  <script>

const SUPABASE_URL = "https://ayzddkcxeswjfpinwvth.supabase.co";
const SUPABASE_KEY = "sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

      async function verificarSesion() {

    const { data } =
        await supabaseClient.auth
        .getSession();

    if (!data.session) {
        window.location.href =
            "login.html";
        return;
    }

    const { data: perfil } =
        await supabaseClient
        .from("usuarios")
        .select("rol")
        .eq("id", data.session.user.id)
        .single();

    if (!perfil || perfil.rol !== "administrador" &&
                   perfil.rol !== "chofer") {

        alert("Acceso denegado");

        window.location.href =
            "login.html";

        return;
    }
}

verificarSesion();

verificarSesion();

      async function cerrarSesion() {

    await supabaseClient.auth
        .signOut();

    window.location.href =
        "login.html";
}

verificarSesion();
      
      let estadoActual = "Pendiente";
      let ultimoConteo = -1;

async function cargarPedidos(estado = 'Pendiente') {
    estadoActual = estado;

    const { data, error } = await supabaseClient
    .from("pedidos")
    .select(`
    *,
    clientes (
        nombre,
        telefono,
        barrio,
        referencia,
        latitud,
        longitud
    )
`)
    .eq("estado", estado)
    .order("fecha", { ascending: false });

    if (error) {
    alert("Error: " + error.message);
    console.log(error);
    return;
}

    const totalPedidos = data.length;

document.getElementById(
    "contadorPedidos"
).innerText =
    totalPedidos + " pedidos";

    if (
    ultimoConteo >= 0 &&
    estado === "Pendiente" &&
    totalPedidos > ultimoConteo
)
    {

    document.getElementById(
        "alertaPedidos"
    ).style.display = "block";

    document.getElementById(
        "alertaPedidos"
    ).innerText =
        "🔔 Nuevo pedido recibido";
        new Audio(
'https://actions.google.com/sounds/v1/alarms/beep_short.ogg'
).play();

    setTimeout(() => {

        document.getElementById(
            "alertaPedidos"
        ).style.display = "none";

    }, 5000);
}

ultimoConteo = totalPedidos;

    let html = "";

    data.forEach(pedido => {

        html += `
    <div class="pedido">
        <h3>${pedido.clientes.nombre}</h3>

        <p><b>Teléfono:</b> ${pedido.clientes.telefono}</p>

        <p><b>Barrio:</b> ${pedido.clientes.barrio}</p>

        <p><b>Referencia:</b> ${pedido.clientes.referencia}</p>

        <p><b>Botellones:</b> ${pedido.cantidad}</p>

        <p><b>Comentario:</b> ${pedido.comentario || ""}</p>

        <p><b>Estado:</b> ${pedido.estado}</p>

        <button onclick="
window.open(
'https://www.google.com/maps?q=${pedido.clientes.latitud},${pedido.clientes.longitud}',
'_blank'
)">
📍 Abrir mapa
</button>
        
        <button onclick="cambiarEstado('${pedido.id}', 'En ruta')">
         En ruta
        </button>

        <button onclick="cambiarEstado('${pedido.id}', 'Entregado')">
        Entregado
        </button>

    </div>
`;
    });

    document.getElementById("listaPedidos").innerHTML = html;
}

cargarPedidos();

      async function cambiarEstado(id, estado) {

    const { error } = await supabaseClient
        .from("pedidos")
        .update({
            estado: estado
        })
        .eq("id", id);

    if (error) {
        alert("Error: " + error.message);
        return;
    }

    cargarPedidos(estadoActual);
}

      setInterval(() => {
    cargarPedidos(estadoActual);
}, 10000);

</script>

    <script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
