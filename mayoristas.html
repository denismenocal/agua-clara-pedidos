    async function verificarSesion(){

    const { data } =
        await supabaseClient.auth.getSession();

    if(!data.session){

        window.location.href="login.html";
        return;

    }

}

async function cerrarSesion(){

    await supabaseClient.auth.signOut();

    window.location.href="login.html";

}

    async function cargarConfiguracion(){

    const { data, error } =
        await supabaseClient
        .from("configuracion")
        .select("*");

    if(error){

        alert(error.message);
        return;

    }

    configuracion = {};

    data.forEach(item=>{

        configuracion[item.clave] =
            Number(item.valor);

    });

}

async function cargarTiendas(){

    const { data,error } =
        await supabaseClient

        .from("clientes")

        .select("*")

        .eq("tipo_cliente","Tienda")

        .order("nombre");

    if(error){

        alert(error.message);
        return;

    }

    listaTiendas=data;

    mostrarTiendas(data);

}

    function filtrarTiendas(){

    const texto =
        document
        .getElementById("buscar")
        .value
        .toLowerCase();

    const filtradas =
        listaTiendas.filter(c=>

            c.nombre
            .toLowerCase()
            .includes(texto)

            ||

            c.telefono
            .includes(texto)

        );

    mostrarTiendas(filtradas);

}



    async function guardarMayorista(cliente_id){

    const nombre_tienda =
        document.getElementById("nombre_tienda").value;

    const precio_botellon =
        parseFloat(
            document.getElementById("precio_botellon").value
        );

    const activo =
        document.getElementById("activo").checked;

    if(isNaN(precio_botellon)){

        alert("Ingrese el precio especial.");
        return;

    }

    // Verificar si ya existe

    const { data: existente } =
        await supabaseClient

        .from("clientes_mayoristas")

        .select("id")

        .eq("cliente_id", cliente_id)

        .maybeSingle();

    let error;

    if(existente){

        // UPDATE

        const resultado =
            await supabaseClient

            .from("clientes_mayoristas")

            .update({

                nombre_tienda,
                tipo_precio,
                precio_botellon,
                activo

            })

            .eq("cliente_id", cliente_id);

        error = resultado.error;

    }else{

        // INSERT

        const resultado =
            await supabaseClient

            .from("clientes_mayoristas")

            .insert([{

                cliente_id,
                nombre_tienda,
                tipo_precio,
                precio_botellon,
                activo

            }]);

        error = resultado.error;

    }

    if(error){

        alert(error.message);
        return;

    }

    alert("Configuración guardada correctamente.");

function calcularDescuento(){

    const tipoPrecio =
document.getElementById(
    "tipo_precio"
).value;

const precioPublico =
configuracion[tipoPrecio];

    const precioEspecial =
        parseFloat(
            document.getElementById(
                "precio_botellon"
            ).value
        );

    if(isNaN(precioEspecial)){

        document.getElementById(
            "descuento"
        ).innerHTML="L 0.00";

        document.getElementById(
            "porcentaje"
        ).innerHTML="0 %";

        return;

    }

    const descuento =
        precioPublico -
        precioEspecial;

    const porcentaje =
        (
            descuento /
            precioPublico
        ) * 100;

    document.getElementById(
        "descuento"
    ).innerHTML=
    "L " +
    descuento.toFixed(2);

    document.getElementById(
        "porcentaje"
    ).innerHTML=
    porcentaje.toFixed(2)
    + " %";

}
