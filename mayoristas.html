<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Clientes Mayoristas</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color"
content="#0077b6">

<link rel="icon"
href="img/favicon_64.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{

    font-family:Arial,Helvetica,sans-serif;
    background:#f4f8fb;
    margin:0;
    padding:20px;

}

.menu{

    display:flex;
    gap:10px;
    margin-bottom:20px;

}

button{

    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;

    background:#0077b6;
    color:white;

}

button:hover{

    background:#005f8f;

}

.tarjeta{

    background:white;

    padding:18px;

    border-radius:12px;

    box-shadow:0 2px 10px rgba(0,0,0,.10);

    margin-bottom:18px;

}

input{

    width:100%;

    box-sizing:border-box;

    padding:14px;

    margin-bottom:15px;

    font-size:17px;

    border-radius:8px;

    border:1px solid #ccc;

}

h2{

    color:#0077b6;

    text-align:center;

}

.cliente{

    background:white;

    padding:18px;

    border-radius:12px;

    box-shadow:0 2px 8px rgba(0,0,0,.10);

    margin-bottom:15px;

}

.estado{

    font-weight:bold;

    color:#666;

}

</style>

</head>

<body>

<div class="menu">

<button
onclick="location.href='menu.html'">

🏠 Menú

</button>

<button
onclick="cerrarSesion()">

🚪 Salir

</button>

</div>

<h2>

🏪 Clientes Mayoristas

</h2>

<div class="tarjeta">

<input

id="buscar"

placeholder="🔍 Buscar tienda o propietario..."

onkeyup="filtrarTiendas()">

</div>

<div id="listaTiendas">

</div>

<script>

const SUPABASE_URL =
"https://ayzddkcxeswjfpinwvth.supabase.co";

const SUPABASE_KEY =
"sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let listaTiendas=[];

    async function verificarSesion(){

    const { data } =
        await supabaseClient.auth.getSession();

    if(!data.session){

        window.location.href="login.html";
        return;

    }

}

async function cerrarSesion(){

    await supabaseClient.auth.signOut();

    window.location.href="login.html";

}

async function cargarTiendas(){

    const { data,error } =
        await supabaseClient

        .from("clientes")

        .select("*")

        .eq("tipo_cliente","Tienda")

        .order("nombre");

    if(error){

        alert(error.message);
        return;

    }

    listaTiendas=data;

    mostrarTiendas(data);

}

    async function mostrarTiendas(clientes){

    let html="";

    for(const cliente of clientes){

        const { data: mayorista } =
            await supabaseClient

            .from("clientes_mayoristas")

            .select("*")

            .eq("cliente_id",cliente.id)

            .maybeSingle();

        html += `

<div class="cliente">

<h3>

🏪 ${cliente.nombre}

</h3>

<p>
<b>👤 Propietario:</b>
${cliente.nombre}
</p>

<p>
<b>📞 Teléfono:</b>
${cliente.telefono}
</p>

<p>
<b>🏘 Municipio:</b>
${cliente.municipio}
</p>

<p>
<b>📍 Barrio:</b>
${cliente.barrio}
</p>

`;

        if(mayorista){

            html += `

<p style="color:green;font-weight:bold;">

🟢 Configurado

</p>

<p>

<b>Precio normal:</b>

L 40

</p>

<p>

<b>Precio especial:</b>

L ${mayorista.precio_botellon}

</p>

<p>

<b>Descuento:</b>

L ${(40-mayorista.precio_botellon).toFixed(2)}

</p>

<p>

<b>Estado:</b>

${mayorista.activo ? "🟢 Activo" : "🔴 Inactivo"}

</p>

<button
onclick="
editarMayorista(
'${cliente.id}'
)
">

✏ Editar configuración

</button>

`;

        }else{

            html += `

<p
style="color:#d68910;
font-weight:bold;">

<p
style="
color:#d68910;
font-weight:bold;
">

🟡 Pendiente de configurar

</p>

<p>

Precio normal:

<b>L 40</b>

</p>

<button
onclick="
configurarMayorista(
'${cliente.id}'
)
">

⚙ Configurar precio especial

</button>

</p>

<button
onclick="
configurarMayorista(
'${cliente.id}'
)
">

➕ Configurar

</button>

`;

        }

        html +=`

</div>

`;

    }

    document.getElementById(
        "listaTiendas"
    ).innerHTML=html;

}

    function filtrarTiendas(){

    const texto =
        document
        .getElementById("buscar")
        .value
        .toLowerCase();

    const filtradas =
        listaTiendas.filter(c=>

            c.nombre
            .toLowerCase()
            .includes(texto)

            ||

            c.telefono
            .includes(texto)

        );

    mostrarTiendas(filtradas);

}

    async function configurarMayorista(id){

    const cliente =
        listaTiendas.find(c=>c.id===id);

    if(!cliente) return;

    const tarjeta =
        event.target.closest(".cliente");

    tarjeta.insertAdjacentHTML(

        "beforeend",

`
<div
id="configuracionMayorista"
style="
margin-top:15px;
padding:15px;
background:#f8f8f8;
border-radius:10px;
">

<input
id="nombre_tienda"
placeholder="Nombre de la tienda"
value="${cliente.nombre}">

<input
id="precio_botellon"
type="number"
inputmode="numeric"
placeholder="Precio especial">

<label>

<input
id="activo"
type="checkbox"
checked>

Activo

</label>

<br><br>

<button
onclick="guardarMayorista('${cliente.id}')">

💾 Guardar

</button>

</div>

`

    );

    event.target.disabled=true;

}

    async function guardarMayorista(cliente_id){

    const nombre_tienda =
        document.getElementById(
            "nombre_tienda"
        ).value;

    const precio_botellon =
        parseFloat(
            document.getElementById(
                "precio_botellon"
            ).value
        );

    const activo =
        document.getElementById(
            "activo"
        ).checked;

    if(!precio_botellon){

        alert(
            "Ingrese el precio especial."
        );

        return;

    }

    const { error } =
        await supabaseClient

        .from("clientes_mayoristas")

        .insert([{

            cliente_id,

            nombre_tienda,

            precio_botellon,

            activo

        }]);

    if(error){

        alert(error.message);
        return;

    }

    alert(
        "Mayorista configurado correctamente."
    );

    cargarTiendas();

}

    function editarMayorista(id){

    alert(
        "Aquí editaremos el precio."
    );

}

    verificarSesion();

    cargarTiendas();

</script>

</body>

</html>
