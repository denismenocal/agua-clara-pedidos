<!DOCTYPE html>
<html>

<head>

<body>

<div style="display:flex;gap:10px;margin-bottom:15px;">

<button onclick="location.href='menu.html'">
🏠 Menú

</button>

</div>

<h2>🏪 Clientes Mayoristas</h2>

<div class="tarjeta">

<select id="cliente" onchange="cargarDatosCliente()">

<option value="">
Seleccione un cliente
</option>

</select>

<input
id="nombre_tienda"
placeholder="Nombre de la tienda">

<input
id="municipio"
placeholder="Municipio">

<input
id="barrio"
placeholder="Barrio o Aldea">

<input
type="number"
inputmode="numeric"
pattern="[0-9]*"
min="0"
step="1"
id="precio_botellon"
placeholder="Precio especial del botellón">

<button onclick="guardarMayorista()">

Guardar Cliente Mayorista

</button>

</div>

<hr>

<div id="listaMayoristas">

</div>

const SUPABASE_KEY = "sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

      async function cargarClientes() {

    const { data, error } =
        await supabaseClient
        .from("clientes")
        .select("id,nombre")
        .order("nombre");

    if(error){

        alert(error.message);
        return;

    }

    let html = `
        <option value="">
            Seleccione un cliente
        </option>
    `;

    data.forEach(cliente => {

        html += `
            <option value="${cliente.id}">
                ${cliente.nombre}
            </option>
        `;

    });

    document.getElementById(
        "cliente"
    ).innerHTML = html;

}

            async function cargarDatosCliente() {

    const cliente_id =
        document.getElementById("cliente").value;

    if (!cliente_id) {

        document.getElementById("municipio").value = "";
        document.getElementById("barrio").value = "";

        return;
    }

    const { data, error } =
        await supabaseClient
        .from("clientes")
        .select("municipio,barrio")
        .eq("id", cliente_id)
        .single();

    if (error) {

        alert(error.message);
        return;
    }

    document.getElementById("municipio").value =
        data.municipio || "";

    document.getElementById("barrio").value =
        data.barrio || "";

}

            async function guardarMayorista() {

    const cliente_id =
        document.getElementById("cliente").value;

    const nombre_tienda =
        document.getElementById("nombre_tienda").value.trim();

    const municipio =
        document.getElementById("municipio").value.trim();

    const barrio =
        document.getElementById("barrio").value.trim();

    const precio_botellon =
        parseFloat(
            document.getElementById("precio_botellon").value
        );

    if (
        !cliente_id ||
        !nombre_tienda ||
        !municipio ||
        !barrio ||
        isNaN(precio_botellon)
    ) {

        alert("Complete todos los campos.");
        return;

    }

    const { data: existe } =
    await supabaseClient
    .from("clientes_mayoristas")
    .select("id")
    .eq("cliente_id", cliente_id)
    .maybeSingle();

    alert(
        "Este cliente ya está registrado como mayorista."
    );

    return;
}

            nombre_tienda,
            municipio,
            barrio,
            precio_botellon

    if(error){

        alert(error.message);
        return;

    }

    alert("Cliente mayorista guardado correctamente.");

    document.getElementById("cliente").selectedIndex = 0;
    document.getElementById("nombre_tienda").value = "";
    document.getElementById("municipio").value = "";
    document.getElementById("barrio").value = "";
    document.getElementById("precio_botellon").value = "";

    cargarMayoristas();

}

            async function cargarMayoristas() {

    const { data, error } =
        await supabaseClient
        .from("clientes_mayoristas")
        .select(`
            *,
            clientes(
                nombre,
                telefono
            )
        `)
        .order("nombre_tienda");

    if(error){

        alert(error.message);
        return;

    }

    let html = "";

    data.forEach(item => {

        html += `

        <div class="tarjeta"
             style="margin-bottom:15px;">

            <h3>${item.nombre_tienda}</h3>

            <p>
            <b>Propietario:</b>
            ${item.clientes.nombre}
            </p>

            <p>
            <b>Teléfono:</b>
            ${item.clientes.telefono}
            </p>

            <p>
            <b>Municipio:</b>
            ${item.municipio}
            </p>

            <p>
            <b>Barrio:</b>
            ${item.barrio}
            </p>

            <p>
            <b>Precio especial:</b>

            L ${item.precio_botellon}

            </p>

        </div>

        `;

    });

    document.getElementById(
        "listaMayoristas"
    ).innerHTML = html;

            cargarClientes();

      </script>
