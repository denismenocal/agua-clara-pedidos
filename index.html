<!DOCTYPE html>
<html>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<head>
    <title>Agua Clara La Muralla</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
        }

        button {
            background: #0077cc;
            color: white;
            border: none;
            border-radius: 5px;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>

    
    
<body>

<h1>Agua Clara La Muralla</h1>

<h3>Registro de Cliente</h3>

<input type="text" id="telefono" placeholder="Número de celular">

<button onclick="buscarCliente()">
Buscar Cliente
</button>

<input type="text" id="nombre" placeholder="Nombre completo">

<input type="text" id="barrio" placeholder="Barrio">

<input type="text" id="referencia" placeholder="Referencia de la vivienda">

<button onclick="obtenerUbicacion()">
Obtener Ubicación
</button>

<p id="gps"></p>

<button id="btnGuardarCliente"
        onclick="guardarCliente()">
Guardar Cliente
</button>

    <hr>

<div id="pedidoSection" style="display:none;">

<hr>

<h3>Pedido de Agua</h3>

<input type="number"
       id="cantidad"
       placeholder="Cantidad de botellones">

<input type="text"
       id="comentario"
       placeholder="Comentario (opcional)">

<button onclick="guardarPedido()">
    Enviar Pedido
</button>

</div>

</body>

<script>

const SUPABASE_URL = "https://ayzddkcxeswjfpinwvth.supabase.co";
const SUPABASE_KEY = "sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

let latitud = null;
let longitud = null;
let cliente_id = null;

function obtenerUbicacion() {
    navigator.geolocation.getCurrentPosition(
        function(posicion) {

            latitud = posicion.coords.latitude;
            longitud = posicion.coords.longitude;

            document.getElementById("gps").innerHTML =
                "Ubicación capturada correctamente";

        },
        function(error) {
            alert("No fue posible obtener la ubicación");
        }
    );
}

async function buscarCliente() {

    const telefono =
        document.getElementById("telefono").value;

    const { data, error } = await supabaseClient
        .from("clientes")
        .select("*")
        .eq("telefono", telefono)
        .limit(1);

    if (error) {
        alert("Error buscando cliente");
        console.log(error);
        return;
    }

    if (data.length > 0) {

        document.getElementById("nombre").value =
            data[0].nombre || "";

        document.getElementById("barrio").value =
            data[0].barrio || "";

        document.getElementById("referencia").value =
            data[0].referencia || "";

        cliente_id = data[0].id;
        
        latitud = data[0].latitud;
        longitud = data[0].longitud;

        document.getElementById("btnGuardarCliente").style.display = "none";
        document.getElementById("pedidoSection").style.display = "block";

        alert("Cliente encontrado");

    } else {

        alert("Cliente no encontrado. Puede registrarlo.");

    }
}    

async function guardarCliente() {

    const telefono =
        document.getElementById("telefono").value;

    const nombre =
        document.getElementById("nombre").value;

    const barrio =
        document.getElementById("barrio").value;

    const referencia =
        document.getElementById("referencia").value;

    document.getElementById("pedidoSection").style.display = "none";
cliente_id = null;

    const { data: existe } = await supabaseClient
        .from("clientes")
        .select("id")
        .eq("telefono", telefono)
        .limit(1);

    let error = null;
    let accion = "";

    if (existe.length > 0) {

        accion = "actualizado";

        const resultado = await supabaseClient
            .from("clientes")
            .update({
                nombre,
                barrio,
                referencia,
                latitud,
                longitud
            })
            .eq("telefono", telefono);

        error = resultado.error;

    } else {

        accion = "registrado";

        const resultado = await supabaseClient
            .from("clientes")
            .insert([
                {
                    telefono,
                    nombre,
                    barrio,
                    referencia,
                    latitud,
                    longitud
                }
            ]);

        error = resultado.error;
    }

    if (error) {
    alert("Error: " + error.message);
    console.log(error);

} else {

    alert("Cliente " + accion + " correctamente");

    document.getElementById("telefono").value = "";
    document.getElementById("nombre").value = "";
    document.getElementById("barrio").value = "";
    document.getElementById("referencia").value = "";

    document.getElementById("gps").innerHTML = "";

    latitud = null;
    longitud = null;
}
}

    async function guardarPedido() {

    if (!cliente_id) {
        alert("Primero busque un cliente");
        return;
    }

    const cantidad =
        parseInt(document.getElementById("cantidad").value);

    const comentario =
        document.getElementById("comentario").value;

    const { error } = await supabaseClient
        .from("pedidos")
        .insert([
            {
                cliente_id: cliente_id,
                cantidad: cantidad,
                comentario: comentario
            }
        ]);

    if (error) {
    alert("Error: " + error.message);
    console.log(error);

} else {

    alert("Pedido enviado correctamente");

    // Limpiar pedido
    document.getElementById("cantidad").value = "";
    document.getElementById("comentario").value = "";

    // Limpiar datos del cliente
    document.getElementById("telefono").value = "";
    document.getElementById("nombre").value = "";
    document.getElementById("barrio").value = "";
    document.getElementById("referencia").value = "";
    document.getElementById("gps").innerHTML = "";

    // Limpiar variables
    cliente_id = null;
    latitud = null;
    longitud = null;

    // Ocultar sección de pedidos
    document.getElementById("pedidoSection").style.display = "none";

    // Regresar el cursor al teléfono
    document.getElementById("telefono").focus();
}
}

</script>

</html>
