<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>Gestión de Clientes</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color"
      content="#0077b6">

<link rel="icon"
      href="img/favicon_64.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{

    font-family:Arial,Helvetica,sans-serif;
    background:#f4f8fb;
    margin:0;
    padding:20px;

}

h2{

    text-align:center;
    color:#0077b6;

}

.menu{

    display:flex;
    gap:10px;
    margin-bottom:20px;

}

.tarjeta{

    background:white;
    border-radius:12px;
    padding:18px;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
    margin-bottom:20px;

}

input,
select,
button{

    width:100%;
    box-sizing:border-box;

    padding:14px;

    margin-bottom:12px;

    font-size:17px;

    border-radius:8px;

    border:1px solid #ccc;

}

button{

    background:#0077b6;
    color:white;
    border:none;
    cursor:pointer;

}

button:hover{

    background:#005f8f;

}

.botones{

    display:flex;
    gap:10px;
    flex-wrap:wrap;

}

.botones button{

    flex:1;

}

.cliente{

    background:white;

    padding:15px;

    border-radius:10px;

    margin-bottom:15px;

    box-shadow:0 2px 8px rgba(0,0,0,.10);

}

</style>

</head>

<body>

<div class="menu">

<button onclick="location.href='menu.html'">
🏠 Menú
</button>

<button onclick="cerrarSesion()">
🚪 Salir
</button>

</div>

<h2>

👥 Gestión de Clientes

</h2>

<div class="tarjeta">

<input
id="buscar"
placeholder="🔍 Buscar por nombre o teléfono..."
onkeyup="filtrarClientes()">

<hr>

<input
id="nombre"
placeholder="Nombre del cliente">

<input
id="telefono"
placeholder="Teléfono"
inputmode="tel">

<input
id="municipio"
placeholder="Municipio">

<input
id="barrio"
placeholder="Barrio o Aldea">

<input
id="referencia"
placeholder="Referencia">

<input
id="identificacion"
placeholder="RTN o DNI">

<select id="tipo_cliente">

<option value="Delivery">
🚚 Delivery
</option>

<option value="Tienda">
🏪 Tienda
</option>

<option value="Cliente Final">
👤 Cliente Final
</option>

</select>

<button
type="button"
id="btnUbicacion"
onclick="obtenerUbicacion()">

📍 Obtener ubicación

</button>

<button
id="btnGuardar"
onclick="guardarCliente()">

💾 Guardar Cliente

</button>

</div>

<div id="listaClientes">

</div>

<script>

const SUPABASE_URL =
"https://ayzddkcxeswjfpinwvth.supabase.co";

const SUPABASE_KEY =
"sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

      async function verificarSesion(){

    const { data } =
        await supabaseClient.auth.getSession();

    if(!data.session){

        window.location.href="login.html";
        return;

    }

}

async function cerrarSesion(){

    await supabaseClient.auth.signOut();

    window.location.href="login.html";

}

async function cargarClientes(){

    const { data,error } =
        await supabaseClient
        .from("clientes")
        .select("*")
        .order("nombre");

    if(error){

        alert(error.message);
        return;

    }

    listaClientes = data;

    mostrarClientes(data);

}

function mostrarClientes(clientes){

    let html="";

    clientes.forEach(cliente=>{

        html += `

<div class="cliente">

<h3>${cliente.nombre}</h3>

<p><b>📞</b> ${cliente.telefono}</p>

<p><b>🏘️</b> ${cliente.municipio || ""}</p>

<p><b>📍</b> ${cliente.barrio || ""}</p>

<p><b>Tipo:</b> ${cliente.tipo_cliente}</p>

<div class="botones">

<button
onclick="editarCliente('${cliente.id}')">
✏️ Editar
</button>

<button
onclick="eliminarCliente('${cliente.id}')">
🗑️ Eliminar
</button>

<button
onclick="abrirMapa(${cliente.latitud ?? "null"},${cliente.longitud ?? "null"})">
📍 Mapa
</button>

</div>

</div>

`;

    });

    document.getElementById(
        "listaClientes"
    ).innerHTML=html;

}

function filtrarClientes(){

    const texto =
        document.getElementById("buscar")
        .value
        .toLowerCase();

    const filtrados =
        listaClientes.filter(c=>

            c.nombre.toLowerCase().includes(texto)

            ||

            c.telefono.includes(texto)

        );

    mostrarClientes(filtrados);

}

async function guardarCliente(){

    const cliente={

        nombre:
        document.getElementById("nombre").value.trim(),

        telefono:
        document.getElementById("telefono").value.trim(),

        municipio:
        document.getElementById("municipio").value.trim(),

        barrio:
        document.getElementById("barrio").value.trim(),

        referencia:
        document.getElementById("referencia").value.trim(),

        identificacion:
        document.getElementById("identificacion").value.trim(),

        tipo_cliente:
        document.getElementById("tipo_cliente").value,

          latitud: latitudCliente,
          longitud: longitudCliente

    };

    if(

        !cliente.nombre ||

        !cliente.telefono ||

        !cliente.municipio ||

        !cliente.barrio

    ){

        alert("Complete los campos obligatorios.");
        return;

    }

    let error;

    if(clienteEditando){

        ({error}=await supabaseClient

        .from("clientes")

        .update(cliente)

        .eq("id",clienteEditando));

    }else{

        ({error}=await supabaseClient

        .from("clientes")

        .insert([cliente]));

    }

    if(error){

        alert(error.message);
        return;

    }

    limpiarFormulario();

    cargarClientes();

}

function editarCliente(id){

    const cliente=
        listaClientes.find(c=>c.id===id);

    if(!cliente) return;

    clienteEditando=id;

    document.getElementById("nombre").value=
    cliente.nombre;

    document.getElementById("telefono").value=
    cliente.telefono;

    document.getElementById("municipio").value=
    cliente.municipio || "";

    document.getElementById("barrio").value=
    cliente.barrio || "";

    document.getElementById("referencia").value=
    cliente.referencia || "";

    document.getElementById("identificacion").value=
    cliente.identificacion || "";

    document.getElementById("tipo_cliente").value=
    cliente.tipo_cliente;

      latitudCliente = cliente.latitud;
longitudCliente = cliente.longitud;

const btnUbicacion =
    document.getElementById("btnUbicacion");

if(cliente.latitud && cliente.longitud){

    btnUbicacion.disabled = true;

    btnUbicacion.innerHTML =
    "✅ Ubicación registrada";

    btnUbicacion.style.background =
    "#28a745";

}else{

    btnUbicacion.disabled = false;

    btnUbicacion.innerHTML =
    "📍 Obtener ubicación";

    btnUbicacion.style.background =
    "#0077b6";

}

    document.getElementById(
        "btnGuardar"
    ).innerHTML=
    "💾 Actualizar Cliente";

    window.scrollTo({

        top:0,

        behavior:"smooth"

    });

}

async function eliminarCliente(id){

    if(
        !confirm(
            "¿Eliminar este cliente?"
        )
    ) return;

    const { error } =
        await supabaseClient

        .from("clientes")

        .delete()

        .eq("id",id);

    if(error){

        alert(error.message);
        return;

    }

    cargarClientes();

}

function abrirMapa(lat,long){

    if(!lat || !long){

        alert(
            "Este cliente no tiene ubicación."
        );

        return;

    }

    window.open(

`https://www.google.com/maps?q=${lat},${long}`,

"_blank"

);

}

function limpiarFormulario(){

    document.getElementById("nombre").value="";

    document.getElementById("telefono").value="";

    document.getElementById("municipio").value="";

    document.getElementById("barrio").value="";

    document.getElementById("referencia").value="";

    document.getElementById("identificacion").value="";

    document.getElementById("tipo_cliente").selectedIndex=0;

    document.getElementById("btnGuardar").innerHTML=

    "💾 Guardar Cliente";

    clienteEditando=null;

      latitudCliente = null;
      longitudCliente = null;

const boton =
    document.getElementById(
        "btnUbicacion"
    );

boton.disabled = false;

boton.innerHTML =
"📍 Obtener ubicación";

      const btnUbicacion =
document.getElementById(
    "btnUbicacion"
);

btnUbicacion.disabled = false;

btnUbicacion.innerHTML =
"📍 Obtener ubicación";

btnUbicacion.style.background =
"#0077b6";

}

function obtenerUbicacion(){

    if(!navigator.geolocation){

        alert("Este dispositivo no soporta GPS.");
        return;

    }

    navigator.geolocation.getCurrentPosition(

        function(posicion){

            latitudCliente =
                posicion.coords.latitude;

            longitudCliente =
                posicion.coords.longitude;

            const boton =
                document.getElementById(
                    "btnUbicacion"
                );

            boton.innerHTML =
"✅ Ubicación registrada";

boton.disabled = true;

boton.style.background =
"#28a745";

        },

        function(){

            alert(
                "No fue posible obtener la ubicación."
            );

        },

        {

            enableHighAccuracy:true,
            timeout:10000

        }

    );

}

verificarSesion();

cargarClientes();

let clienteEditando = null;
let listaClientes = [];

let latitudCliente = null;
let longitudCliente = null;

</script>

</body>

</html>
