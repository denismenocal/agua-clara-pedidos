<!DOCTYPE html>
<html>

<head>

<title>Gestion de Clientes</title>

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<link rel="icon"
      href="img/favicon_64.png">

<link rel="manifest"
      href="manifest.json">

<meta name="theme-color"
      content="#0077b6">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial;
    padding:20px;
    background:#f4f8fb;
}

input,
select,
button{

    width:100%;
    padding:14px;
    margin-bottom:12px;
    font-size:18px;
    box-sizing:border-box;

}

button{

    background:#0077b6;
    color:white;
    border:none;
    border-radius:10px;

}

.tarjeta{

    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);

}

</style>

</head>

<body>

<div style="display:flex;gap:10px;margin-bottom:15px;">

<button onclick="location.href='menu.html'">
🏠 Menú
</button>

<button onclick="cerrarSesion()">
🚪 Salir
</button>

</div>

      <h2>👥 Gestión de Clientes</h2>

<div class="tarjeta">

<input
id="nombre"
placeholder="Nombre del cliente">

<input
id="telefono"
placeholder="Teléfono">

<input
id="municipio"
placeholder="Municipio">

<input
id="barrio"
placeholder="Barrio o Aldea">

<input
id="referencia"
placeholder="Referencia">

<input
id="identificacion"
placeholder="RTN o DNI">

<select id="tipo_cliente">

<option value="Delivery">
🚚 Delivery
</option>

<option value="Tienda">
🏪 Tienda
</option>

<option value="Cliente Final">
👤 Cliente Final
</option>

</select>

<button onclick="guardarCliente()">

💾 Guardar Cliente

</button>

</div>

<hr>

<div id="listaClientes"></div>

      </body>

</html>
