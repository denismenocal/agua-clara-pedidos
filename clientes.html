<!DOCTYPE html>
<html>

<head>

<title>Gestion de Clientes</title>

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<link rel="icon"
      href="img/favicon_64.png">

<link rel="manifest"
      href="manifest.json">

<meta name="theme-color"
      content="#0077b6">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial;
    padding:20px;
    background:#f4f8fb;
}

input,
select,
button{

    width:100%;
    padding:14px;
    margin-bottom:12px;
    font-size:18px;
    box-sizing:border-box;

}

button{

    background:#0077b6;
    color:white;
    border:none;
    border-radius:10px;

}

.tarjeta{

    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);

}

</style>

</head>

<body>

<div style="display:flex;gap:10px;margin-bottom:15px;">

<button onclick="location.href='menu.html'">
🏠 Menú
</button>

<button onclick="cerrarSesion()">
🚪 Salir
</button>

</div>

      <h2>👥 Gestión de Clientes</h2>

<div class="tarjeta">

      <input
id="buscarCliente"
placeholder="🔍 Buscar por nombre o teléfono..."
onkeyup="filtrarClientes()">

<input
id="nombre"
placeholder="Nombre del cliente">

<input
id="telefono"
placeholder="Teléfono">

<input
id="municipio"
placeholder="Municipio">

<input
id="barrio"
placeholder="Barrio o Aldea">

<input
id="referencia"
placeholder="Referencia">

<input
id="identificacion"
placeholder="RTN o DNI">

<select id="tipo_cliente">

<option value="Delivery">
🚚 Delivery
</option>

<option value="Tienda">
🏪 Tienda
</option>

<option value="Cliente Final">
👤 Cliente Final
</option>

</select>

<button onclick="guardarCliente()">

💾 Guardar Cliente

</button>

</div>

<hr>

<div id="listaClientes"></div>

      <script>

const SUPABASE_URL = "https://ayzddkcxeswjfpinwvth.supabase.co";
const SUPABASE_KEY = "sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

            let clienteEditando = null;

      async function guardarCliente() {

    const nombre =
        document.getElementById("nombre").value.trim();

    const telefono =
        document.getElementById("telefono").value.trim();

    const municipio =
        document.getElementById("municipio").value.trim();

    const barrio =
        document.getElementById("barrio").value.trim();

    const referencia =
        document.getElementById("referencia").value.trim();

    const identificacion =
        document.getElementById("identificacion").value.trim();

    const tipo_cliente =
        document.getElementById("tipo_cliente").value;

    if(
        !nombre ||
        !telefono ||
        !municipio ||
        !barrio
    ){

        alert(
            "Complete todos los campos obligatorios."
        );

        return;

    }

    obtenerUbicacionYGuardar(
        nombre,
        telefono,
        municipio,
        barrio,
        referencia,
        identificacion,
        tipo_cliente
    );

}

      function obtenerUbicacionYGuardar(

    nombre,
    telefono,
    municipio,
    barrio,
    referencia,
    identificacion,
    tipo_cliente

){

    if(!navigator.geolocation){

        guardarClienteBD(

            nombre,
            telefono,
            municipio,
            barrio,
            referencia,
            identificacion,
            tipo_cliente,
            null,
            null

        );

        return;

    }

    navigator.geolocation.getCurrentPosition(

        function(posicion){

            guardarClienteBD(

                nombre,
                telefono,
                municipio,
                barrio,
                referencia,
                identificacion,
                tipo_cliente,

                posicion.coords.latitude,
                posicion.coords.longitude

            );

        },

        function(){

            guardarClienteBD(

                nombre,
                telefono,
                municipio,
                barrio,
                referencia,
                identificacion,
                tipo_cliente,

                null,
                null

            );

        }

    );

}

      async function guardarClienteBD(

    nombre,
    telefono,
    municipio,
    barrio,
    referencia,
    identificacion,
    tipo_cliente,
    latitud,
    longitud

){

    // Buscar si ya existe por teléfono

    const { data: clienteExistente } =
        await supabaseClient
        .from("clientes")
        .select("*")
        .eq("telefono", telefono)
        .maybeSingle();

    // Si existe

    if(clienteExistente){

        // Si no tiene coordenadas y ahora sí las obtuvimos,
        // solo actualizamos las coordenadas.

        if(

            (!clienteExistente.latitud ||
             !clienteExistente.longitud)

            &&

            latitud &&
            longitud

        ){

            await supabaseClient
                .from("clientes")
                .update({

                    latitud,
                    longitud

                })
                .eq(
                    "id",
                    clienteExistente.id
                );

        }

        alert(
            "Este cliente ya existe."
        );

        return;

    }

    let error;

if(clienteEditando){

    const resultado =
        await supabaseClient
        .from("clientes")
        .update({

            nombre,
            telefono,
            municipio,
            barrio,
            referencia,
            identificacion,
            tipo_cliente

        })
        .eq("id", clienteEditando);

    error = resultado.error;

}else{

    const resultado =
        await supabaseClient
        .from("clientes")
        .insert([{

            nombre,
            telefono,
            municipio,
            barrio,
            referencia,
            identificacion,
            tipo_cliente,
            latitud,
            longitud

        }]);

    error = resultado.error;

}

            nombre,
            telefono,
            municipio,
            barrio,
            referencia,
            identificacion,
            tipo_cliente,
            latitud,
            longitud

        }]);

    if(error){

        alert(error.message);
        return;

    }

    alert(
        "Cliente guardado correctamente."
    );

            clienteEditando = null;

document.querySelector(
    "button[onclick='guardarCliente()']"
).innerHTML =
"💾 Guardar Cliente";

    document
        .querySelectorAll(
            "input"
        )
        .forEach(campo => {

            campo.value = "";

        });

    document
        .getElementById(
            "tipo_cliente"
        ).selectedIndex = 0;

    cargarClientes();

}

      async function cargarClientes() {

    const { data, error } =
        await supabaseClient
        .from("clientes")
        .select("*")
        .order("nombre");

    if(error){

        alert(error.message);
        return;

    }

            window.listaClientes = data;

    let html = "";

    data.forEach(cliente => {

        html += `

        <div class="tarjeta"
             style="margin-bottom:15px;">

            <h3>
            👤 ${cliente.nombre}
            </h3>

            <p>
            <b>📞 Teléfono:</b>
            ${cliente.telefono}
            </p>

            <p>
            <b>🏘️ Municipio:</b>
            ${cliente.municipio || ""}
            </p>

            <p>
            <b>📍 Barrio:</b>
            ${cliente.barrio || ""}
            </p>

            <p>
            <b>🚚 Tipo:</b>
            ${cliente.tipo_cliente}
            </p>

            <div
            style="
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            ">

                <button
                onclick="
                abrirMapa(
                ${cliente.latitud},
                ${cliente.longitud}
                )
                ">
                📍 Ver mapa
                </button>

                <button
                onclick="
                editarCliente(
                '${cliente.id}'
                )
                ">
                ✏️ Editar
                </button>

                <button
                onclick="
                eliminarCliente(
                '${cliente.id}'
                )
                ">
                🗑️ Eliminar
                </button>

            </div>

        </div>

        `;

    });

    document.getElementById(
        "listaClientes"
    ).innerHTML = html;

}

      function abrirMapa(
    latitud,
    longitud
){

    if(
        !latitud ||
        !longitud
    ){

        alert(
            "Este cliente no tiene ubicación."
        );

        return;

    }

    window.open(

        `https://www.google.com/maps?q=${latitud},${longitud}`,

        "_blank"

    );

}

      function editarCliente(id){

    const cliente =
        window.listaClientes.find(c => c.id == id);

    if(!cliente) return;

    clienteEditando = id;

    document.getElementById("nombre").value =
        cliente.nombre;

    document.getElementById("telefono").value =
        cliente.telefono;

    document.getElementById("municipio").value =
        cliente.municipio || "";

    document.getElementById("barrio").value =
        cliente.barrio || "";

    document.getElementById("referencia").value =
        cliente.referencia || "";

    document.getElementById("identificacion").value =
        cliente.identificacion || "";

    document.getElementById("tipo_cliente").value =
        cliente.tipo_cliente;

    document.querySelector("button[onclick='guardarCliente()']").innerHTML =
        "💾 Actualizar Cliente";

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

}

      async function eliminarCliente(id){

    if(
        !confirm(
            "¿Eliminar este cliente?"
        )
    ){
        return;
    }

    const { error } =
        await supabaseClient
        .from("clientes")
        .delete()
        .eq("id", id);

    if(error){

        alert(error.message);
        return;

    }

    cargarClientes();

}

            function filtrarClientes(){

    const texto =
        document
        .getElementById("buscarCliente")
        .value
        .toLowerCase();

    let html = "";

    window.listaClientes
    .filter(cliente =>

        cliente.nombre
            .toLowerCase()
            .includes(texto)

        ||

        cliente.telefono
            .includes(texto)

    )

    .forEach(cliente=>{

        html += `

<div class="tarjeta"
style="margin-bottom:15px;">

<h3>👤 ${cliente.nombre}</h3>

<p><b>📞</b> ${cliente.telefono}</p>

<p><b>🏘️</b> ${cliente.municipio || ""}</p>

<p><b>📍</b> ${cliente.barrio || ""}</p>

<p><b>Tipo:</b> ${cliente.tipo_cliente}</p>

<div style="display:flex;gap:10px;flex-wrap:wrap;">

<button onclick="abrirMapa(${cliente.latitud},${cliente.longitud})">
📍 Ver mapa
</button>

<button onclick="editarCliente('${cliente.id}')">
✏️ Editar
</button>

<button onclick="eliminarCliente('${cliente.id}')">
🗑️ Eliminar
</button>

</div>

</div>

`;

    });

    document.getElementById(
        "listaClientes"
    ).innerHTML = html;

}


      cargarClientes();

      </script>


      </body>

</html>
