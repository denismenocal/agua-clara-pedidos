<!DOCTYPE html>
<html>
<head>
    <title>Agua Clara La Muralla</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

     <link rel="icon"
      href="img/favicon_64.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>

        body{
            font-family:Arial;
            padding:20px;
            text-align:center;
        }

        button{
            width:100%;
            padding:20px;
            margin-top:10px;
            font-size:20px;
            border:none;
            border-radius:10px;
        }

        .titulo{
            margin-bottom:20px;
        }

    </style>

</head>

<body>

    <img src="img/logo_menu_192.webp"
     style="width:100px;">

<h1 class="titulo">
💧 Agua Clara La Muralla
</h1>

<h3 id="usuario"></h3>

<div id="menu"></div>

<script>

const SUPABASE_URL = "https://ayzddkcxeswjfpinwvth.supabase.co";
const SUPABASE_KEY = "sb_publishable_34T_1LZ8Brpa_3sq2vT_Ew_AIvOuTDl";

const supabaseClient =
    supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );

async function cargarMenu(){

    const { data } =
        await supabaseClient.auth
        .getSession();

    if(!data.session){
        window.location.href="login.html";
        return;
    }

    const { data: perfil } =
        await supabaseClient
        .from("usuarios")
        .select("*")
        .eq(
            "id",
            data.session.user.id
        )
        .single();

    document.getElementById(
        "usuario"
    ).innerHTML =
        perfil.nombre;

    let html = "";

    if(perfil.rol==="administrador"){

        html += `
        <button onclick="
        location.href='admin.html'
        ">
        🚚 Pedidos
        </button>

        <button onclick="
        location.href='cierres.html'
        ">
        💰 Cierres
        </button>

        <button onclick="
        location.href='reportes.html'
        ">
        📊 Reportes
        </button>
        `;
    }

    if(perfil.rol==="chofer"){

        html += `
        <button onclick="
        location.href='admin.html'
        ">
        🚚 Pedidos
        </button>

        <button onclick="
        location.href='cierres.html'
        ">
        💰 Cierres
        </button>
        `;
    }

    html += `
    <button onclick="
    cerrarSesion()
    ">
    🚪 Cerrar sesión
    </button>
    `;

    document.getElementById(
        "menu"
    ).innerHTML = html;
}

async function cerrarSesion(){

    await supabaseClient.auth
        .signOut();

    window.location.href =
        "login.html";
}

cargarMenu();

</script>

</body>
</html>
